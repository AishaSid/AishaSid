name: Generate Game Contribution Graphs

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:           # manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── PAC-MAN  (purple / pink / cyan on deep dark bg) ──────────────
      - name: Generate Pac-Man contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman.svg?pac_man=true&color_dots=#7209b7,#9d4edd,#c77dff,#e0aaff,#f72585&color_bg=#ffffff
            dist/pacman-dark.svg?pac_man=true&color_dots=#3a0ca3,#7209b7,#c77dff,#f72585,#ff85a1&color_bg=#0d0221

      # ── GALAGA  (alien yellow/green on near-black dark bg) ───────────
      - name: Generate Galaga contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/galaga.svg?pac_man=true&color_dots=#ffd60a,#f4a228,#f77f00,#d62828,#003049&color_bg=#ffffff
            dist/galaga-dark.svg?pac_man=true&color_dots=#003049,#f77f00,#f4a228,#ffd60a,#ffffff&color_bg=#03071e

      # ── Push both SVGs to the output branch ─────────────────────────
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
