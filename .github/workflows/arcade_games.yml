name: Generate Arcade Contribution Games

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight
  workflow_dispatch: # Allows manual triggers
  push:
    branches:
      - main

jobs:
  generate_games:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and Run Arcade Graph Generator
        run: |
          mkdir -p dist
          npm install -g pacman-contribution-graph
          
          # Generate Pacman Theme
          pacman-contribution-graph --game pacman --platform github --username AishaSid --gameTheme github-dark --output dist/pacman-graph.svg
          
          # Generate Galaga Theme
          pacman-contribution-graph --game galaga --platform github --username AishaSid --gameTheme github-dark --output dist/galaga-graph.svg

      - name: Push SVGs to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
